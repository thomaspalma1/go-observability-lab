name: Go Observability Lab

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  GO_VERSION: '1.26'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

