name: Go Observability Lab

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  GO_VERSION: '1.26'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Build
      run: go build -v ./...

    - name: Vet
      run: go vet ./...

    - name: Test with race detector
      run: go test -race -v ./...

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Start stack
      run: docker compose -f deploy/docker-compose.yaml up -d --build
    - name: Wait and check health
      run: |
        sleep 10
        curl --fail http://localhost:8082/healthz
    - name: Tear down
      if: always()
      run: docker compose -f deploy/docker-compose.yaml down -v
